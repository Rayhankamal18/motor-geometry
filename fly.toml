# Fly.io — deploy gratis (perlu kartu untuk verifikasi, ada kuota free).
# Panduan: DEPLOY.md bagian Fly.io

app = "motor-geometry"
primary_region = "sin"

[build]
  dockerfile = "Dockerfile"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0

[[vm]]
  size = "shared-cpu-1x"
  memory = "256mb"

[env]
  PORT = "8080"
