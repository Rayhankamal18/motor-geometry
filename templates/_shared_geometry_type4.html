<form id="geometry-form" class="form-grid-sectioned" autocomplete="off">
  <section class="form-section">
    <h3 class="form-section-title">Panjang komponen</h3>
    <div class="form-section-grid">
      <label>
        <span>Panjang bit (ft)</span>
        <input type="number" step="any" name="L_bit" value="0" required>
      </label>
      <label>
        <span>Panjang tilted drive bushing (TDB) (ft)</span>
        <input type="number" step="any" name="L_TDB" value="0" required>
      </label>
      <label>
        <span>Panjang stabilizer 1 (S1) (ft)</span>
        <input type="number" step="any" name="L_S1" value="0" required>
      </label>
      <label>
        <span>Panjang bent housing (BH) (ft)</span>
        <input type="number" step="any" name="L_BH" value="0" required>
      </label>
      <label>
        <span>Panjang bent sub (BS) (ft)</span>
        <input type="number" step="any" name="L_BS" value="0" required>
      </label>
      <label>
        <span>Panjang stabilizer 2 (S2) (ft)</span>
        <input type="number" step="any" name="L_S2" value="0" required>
      </label>
    </div>
  </section>
  <section class="form-section">
    <h3 class="form-section-title">Diameter &amp; clearance</h3>
    <div class="form-section-grid">
      <label>
        <span>Diameter lubang (in)</span>
        <input type="number" step="any" name="D_hole" value="0" required>
      </label>
      <label>
        <span>Diameter stabilizer 1 (in)</span>
        <input type="number" step="any" name="D_stab1" value="0" required>
      </label>
      <label>
        <span>Diameter stabilizer 2 (in)</span>
        <input type="number" step="any" name="D_stab2" value="0" required>
      </label>
    </div>
  </section>
  <section class="form-section">
    <h3 class="form-section-title">Sudut bend</h3>
    <div class="form-section-grid">
      <label>
        <span>Sudut tilted drive bushing (TDB) — x (deg)</span>
        <input type="number" step="any" name="X_tdb_deg" value="0" required>
      </label>
      <label>
        <span>Sudut bent housing (BH) — y (deg)</span>
        <input type="number" step="any" name="Y_bent_housing_deg" value="0" required>
      </label>
      <label>
        <span>Sudut bent sub (BS) — z (deg)</span>
        <input type="number" step="any" name="Z_bent_sub_deg" value="0" required>
      </label>
    </div>
  </section>
</form>
